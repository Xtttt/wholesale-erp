<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Zephyr ERP</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='brand/zephyr-logo.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --z-white: #ffffff;
            --z-paper: #fcfbf9;
            --z-warm-gray: #f6f2ed;
            --z-line: #e9e3dc;
            --z-soft-line: #f1ece6;
            --z-muted: #8f8881;
            --z-charcoal: #332f2b;
            --z-ink: #1d1a18;
            --z-accent: #8f6f55;
            --z-deep-brown: #5d3f2d;
            --font-serif: 'Playfair Display', Georgia, 'Times New Roman', serif;
            --font-display-cn: 'Microsoft YaHei UI', 'Noto Sans SC', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            --font-sans: 'Microsoft YaHei UI', 'Noto Sans SC', 'Inter', 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            --shadow-soft: 0 10px 24px rgba(31, 27, 22, 0.045);
            --shadow-float: 0 18px 48px rgba(31, 27, 22, 0.12);
        }

        * { letter-spacing: 0; }

        body {
            font-family: var(--font-sans);
            font-size: 14px;
            color: var(--z-charcoal);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.96), rgba(252,251,249,0.98)),
                var(--z-paper);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 380px;
            padding: 0 20px;
        }

        .login-card {
            background: rgba(255,255,255,0.98);
            border: 1px solid var(--z-line);
            border-radius: 8px;
            box-shadow: var(--shadow-float);
            overflow: hidden;
        }

        .login-header {
            padding: 40px 32px 0;
            text-align: center;
        }

        .brand-logo {
            display: block;
            width: 156px;
            max-width: 100%;
            height: auto;
            margin: 0 auto 16px;
        }

        .brand-kicker {
            display: block;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--z-muted);
            margin-bottom: 28px;
        }

        .login-body {
            padding: 0 32px 36px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--z-muted);
            margin-bottom: 6px;
        }

        .form-control {
            border: 1px solid var(--z-line);
            border-radius: 6px;
            color: var(--z-ink);
            background-color: #fffefd;
            min-height: 44px;
            font-size: 15px;
            padding: 10px 14px;
        }

        .form-control:focus {
            border-color: var(--z-ink);
            box-shadow: 0 0 0 0.18rem rgba(44, 40, 37, 0.10);
        }

        .form-control::placeholder {
            color: #c0b8b0;
        }

        .btn-login {
            width: 100%;
            border-radius: 4px;
            font-weight: 600;
            font-size: 14px;
            min-height: 44px;
            border-width: 1px;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
            background: var(--z-ink);
            border-color: var(--z-ink);
            color: var(--z-white);
        }

        .btn-login:hover {
            background: #000000;
            border-color: #000000;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(31, 27, 22, 0.15);
            color: var(--z-white);
        }

        .alert {
            border-radius: 6px;
            border: 1px solid var(--z-line);
            box-shadow: var(--shadow-soft);
            font-size: 13px;
            padding: 10px 14px;
            margin-bottom: 20px;
        }

        .alert-danger {
            background: #fef5f4;
            border-color: #f1d4d0;
            color: var(--z-charcoal);
        }

        .alert-danger i {
            color: #b95d4f;
        }

        .login-footer {
            text-align: center;
            padding-top: 16px;
        }

        .login-footer small {
            color: var(--z-muted);
            font-size: 11px;
            letter-spacing: 0.04em;
        }

        .input-icon-wrapper {
            position: relative;
        }

        .input-icon-wrapper .form-control {
            padding-left: 42px;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--z-muted);
            font-size: 16px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img class="brand-logo" src="{{ url_for('static', filename='brand/zephyr-logo.png') }}" alt="Zephyr">
                <span class="brand-kicker">Operations ERP</span>
            </div>

            <div class="login-body">
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else category }}">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ message }}
                </div>
                {% endfor %}
                {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('login') }}" autocomplete="off">
                    <div class="mb-4">
                        <label class="form-label" for="password">系统密码</label>
                        <div class="input-icon-wrapper">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password"
                                   class="form-control"
                                   id="password"
                                   name="password"
                                   placeholder="请输入访问密码"
                                   required
                                   autofocus>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-login">
                        <i class="bi bi-box-arrow-in-right me-2"></i>登录系统
                    </button>
                </form>

                <div class="login-footer">
                    <small>Zephyr Wholesale ERP &mdash; 内部管理系统</small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
