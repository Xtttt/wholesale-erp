{% extends "base.html" %}
{% block title %}新建订单{% endblock %}
{% block content %}

<h4 class="mb-4"><i class="bi bi-cart-plus me-2"></i>新建订单</h4>

<div class="card">
    <div class="card-body">
        <form method="POST" id="orderForm">
            <!-- 基本信息 -->
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <label class="form-label">客户 <span class="text-danger">*</span></label>
                    <select name="customer_id" class="form-select" required onchange="loadCustomerPrice(this.value)">
                        <option value="">-- 选择客户 --</option>
                        {% for c in customers %}
                        <option value="{{ c.id }}">{{ c.name }}{% if c.unit_price %} (¥{{ '%.0f'|format(c.unit_price) }}){% endif %}</option>
                        {% endfor %}
                    </select>
                    <div class="form-text"><a href="{{ url_for('customer_add') }}" target="_blank">+ 新建客户</a></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">产品 <span class="text-danger">*</span></label>
                    <select name="product_id" class="form-select" required onchange="loadProductConfig(this.value)">
                        {% for p in products %}
                        <option value="{{ p.id }}">{{ p.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">单价 (¥)</label>
                    <input type="number" name="unit_price" class="form-control" step="0.01" min="0" id="unitPrice"
                           placeholder="选择客户自动填入">
                </div>
            </div>

            <!-- 尺码矩阵 -->
            <label class="form-label fw-bold">尺码矩阵</label>
            <div class="table-responsive" id="matrixContainer">
                <table class="table table-bordered matrix-table" id="matrixTable">
                    <thead class="table-light">
                        <tr>
                            <th style="width:100px">颜色</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="10" class="text-center text-muted py-3">选择产品后自动加载...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- 备注 -->
            <div class="mb-3">
                <label class="form-label">备注</label>
                <textarea name="notes" class="form-control" rows="2" placeholder="订单备注..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-lg">
                <i class="bi bi-check-lg me-1"></i> 创建订单
            </button>
            <a href="{{ url_for('order_list') }}" class="btn btn-outline-secondary">取消</a>
        </form>
    </div>
</div>

{% endblock %}
{% block scripts %}
<script>
// 选择客户时自动填入单价
function loadCustomerPrice(customerId) {
    if (!customerId) return;
    fetch('/api/customer/' + customerId + '/price')
        .then(r => r.json())
        .then(data => {
            if (data.unit_price) {
                document.getElementById('unitPrice').value = data.unit_price;
            }
        });
}

// 选择产品时加载颜色和尺码
function loadProductConfig(productId) {
    if (!productId) return;
    fetch('/api/product/' + productId + '/config')
        .then(r => r.json())
        .then(data => buildMatrix(data.colors, data.sizes));
}

function buildMatrix(colors, sizes) {
    const thead = document.querySelector('#matrixTable thead');
    const tbody = document.querySelector('#matrixTable tbody');

    // 表头
    let headHtml = '<tr><th style="width:100px">颜色</th>';
    sizes.forEach(s => { headHtml += '<th>' + s + '</th>'; });
    headHtml += '</tr>';
    thead.innerHTML = headHtml;

    // 数据行
    let bodyHtml = '';
    colors.forEach(color => {
        bodyHtml += '<tr>';
        bodyHtml += '<td class="color-label">';
        bodyHtml += '<span class="color-dot" style="background:' + color.hex_code + '"></span>';
        bodyHtml += color.name + '</td>';
        sizes.forEach(size => {
            bodyHtml += '<td><input type="number" class="form-control" min="0" value="0" ' +
                        'name="qty_' + color.id + '_' + size + '" onfocus="this.select()"></td>';
        });
        bodyHtml += '</tr>';
    });
    tbody.innerHTML = bodyHtml;
}

// 页面加载时，如果已有默认产品，自动加载矩阵
document.addEventListener('DOMContentLoaded', function() {
    const productSelect = document.querySelector('select[name="product_id"]');
    if (productSelect && productSelect.value) {
        loadProductConfig(productSelect.value);
    }
});
</script>
{% endblock %}
